<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evolutionary Polygon Visualization and Experiment Platform</title>

  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/explorer.css" />
  <link rel="stylesheet" href="./css/experiment.css" />
  <link rel="stylesheet" href="./css/single-experiment.css" />
  <link rel="stylesheet" href="./css/locality-experiment.css" />
  <link rel="stylesheet" href="./css/compare-experiment.css" />
  


</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>Evolutionary Polygon Visualization and Experiment Platform</h1>
    </header>

    <div class="mode-toggle" role="tablist" aria-label="Application modes">
      <button
        class="mode-btn active"
        data-mode="explorer"
        type="button"
        role="tab"
        aria-selected="true"
        tabindex="0"
      >
        Explorer
      </button>

      <button
        class="mode-btn"
        data-mode="experiment"
        type="button"
        role="tab"
        aria-selected="false"
        tabindex="-1"
      >
        Experiment
      </button>
    </div>

    <main id="app"></main>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
